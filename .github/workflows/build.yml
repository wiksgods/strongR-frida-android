- name: Build strongR-frida (ARM64)
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 1. Tải bộ Patch từ hzzheyang (vì repo của bạn hiện không có thư mục Patchs)
        echo "--- Đang tải bộ Patch tàng hình ---"
        git clone https://github.com/hzzheyang/strongR-frida-android.git ExternalPatch
        PATCH_ROOT=$(realpath ExternalPatch/strongR-frida)
        
        # 2. Clone Frida Source (v17.7.3)
        echo "--- Đang tải Frida v${{ needs.check_version.outputs.FRIDA_VERSION }} ---"
        git clone --depth 1 --branch ${{ needs.check_version.outputs.FRIDA_VERSION }} --recurse-submodules https://github.com/frida/frida
        cd frida
        FRIDA_ROOT=$(pwd)
        
        # 3. Áp dụng các bản vá (StrongR/Hluda)
        echo "--- Đang áp dụng Patches ---"
        for path in "$PATCH_ROOT"/*; do
          if [ -d "$path" ]; then
            subproject=$(basename "$path")
            if [ -d "subprojects/$subproject" ]; then
              echo "Patching cho $subproject..."
              cd "subprojects/$subproject"
              git am --abort 2>/dev/null || true
              git am "$path"/*.patch || echo "Skip patch error for $subproject"
              cd "$FRIDA_ROOT"
            fi
          fi
        done
        
        # 4. Biên dịch bằng lệnh 'make' của Frida (Fix lỗi đường dẫn Ninja)
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "--- Bắt đầu Build (Target: Core) ---"
        
        # ./configure sẽ chuẩn bị các file cấu hình
        ./configure --host=android-arm64
        
        # Sử dụng lệnh make để nó tự điều phối Ninja vào đúng thư mục build
        # Lệnh này sẽ build toàn bộ lõi, bao gồm cả frida-server
        make core-android-arm64
        
        # 5. Tìm kiếm file binary và Đóng gói
        mkdir -p ../dist
        echo "--- Tìm file frida-server sau build ---"
        # Tìm file trong cây thư mục build (thường ở build/frida-android-arm64/subprojects/frida-core/server)
        SERVER_PATH=$(find build/ -name frida-server -type f | grep "android-arm64" | head -n 1)
        
        if [ -z "$SERVER_PATH" ]; then
          echo "Lỗi: Không tìm thấy file frida-server!"
          find build/ -name "frida-server"
          exit 1
        fi
        
        echo "Đã tìm thấy tại: $SERVER_PATH"
        cp "$SERVER_PATH" "../dist/hluda-server-arm64"
        gzip "../dist/hluda-server-arm64"

    - name: Upload Frida Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-v${{ needs.check_version.outputs.FRIDA_VERSION }}-arm64
        path: dist/hluda-server-arm64.gz
