name: strongR-frida

on:
  workflow_dispatch: # Chạy thủ công bằng nút "Run workflow"

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}
    steps:
      - name: Pull Frida Latest Release
        id: pullFridaLatestRelease
        uses: actions/github-script@v6
        with:
          script: |
            const releaseResponse = await github.rest.repos.getLatestRelease({
              owner: 'frida',
              repo: 'frida',
            })
            core.setOutput('FRIDA_VERSION', releaseResponse.data.tag_name);

  android_build:
    runs-on: ubuntu-22.04
    needs: [check_version]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip -y
        python3 -m pip install lief

    - name: Build strongR-frida (ARM64)
      shell: bash
      run: |
        # 1. Cấu hình Git
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 2. Clone Patch repo (Sử dụng đường dẫn tuyệt đối sau này)
        echo "--- Cloning Patches ---"
        git clone ${{ secrets.PATCH_REPO }} MyPatches || { echo "Không tìm thấy Patch Repo. Hãy kiểm tra Secret PATCH_REPO"; exit 1; }
        PATCH_ROOT=$(realpath MyPatches/strongR-frida)
        
        # 3. Clone Frida Source
        echo "--- Cloning Frida Source (${{ needs.check_version.outputs.FRIDA_VERSION }}) ---"
        git clone --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # 4. Apply Patches
        echo "--- Applying Patches from $PATCH_ROOT ---"
        for path in "$PATCH_ROOT"/*; do
          if [ -d "$path" ]; then
            subproject=$(basename "$path")
            if [ -d "subprojects/$subproject" ]; then
              echo "Patching subprojects/$subproject..."
              cd "subprojects/$subproject"
              git am "$path"/*.patch || echo "Cảnh báo: Patch lỗi tại $subproject, bỏ qua..."
              cd ../..
            fi
          fi
        done
        
        # 5. Biên dịch (Chỉ ARM64 để tránh crash máy ảo)
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "--- Starting Build ---"
        ./configure --host=android-arm64
        make
        
        # 6. Gom file kết quả
        mkdir -p ../dist
        cp subprojects/frida-core/server/frida-server ../dist/hluda-server-arm64
        gzip ../dist/hluda-server-arm64

    - name: Upload Frida Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-v${{ needs.check_version.outputs.FRIDA_VERSION }}
        path: dist/hluda-server-arm64.gz
