name: strongR-frida-auto-full-fix

on:
  workflow_dispatch: # Chạy thủ công bằng nút "Run workflow"
  schedule:
    - cron: "0 0 * * *" # Tự động kiểm tra bản mới mỗi ngày

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get Latest Frida Version
        id: get_version
        run: |
          # Lấy phiên bản mới nhất từ Frida Release
          VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | jq -r .tag_name)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  android_build:
    runs-on: ubuntu-22.04
    needs: check_version
    steps:
    - name: Checkout Current Repo
      uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.2.0
      with:
        ndk-version: r25b # Sử dụng bản NDK ổn định cho Frida

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip -y
        python3 -m pip install lief # Cài đặt LIEF cho việc xử lý binary

    - name: Build strongR-frida (ARM64)
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 1. Tải bộ Patch từ nguồn hzzheyang vì repo hiện tại của bạn đang thiếu
        echo "--- Đang tải bộ Patch tàng hình từ hzzheyang ---"
        git clone https://github.com/hzzheyang/strongR-frida-android.git ExternalPatch
        PATCH_ROOT=$(realpath ExternalPatch/strongR-frida)
        echo "PATCH_ROOT xác nhận tại: $PATCH_ROOT"
        
        # 2. Clone Frida Source (Chỉ lấy tag mới nhất để tránh tràn RAM/Disk)
        echo "--- Đang tải Frida v${{ needs.check_version.outputs.FRIDA_VERSION }} ---"
        git clone --depth 1 --branch ${{ needs.check_version.outputs.FRIDA_VERSION }} --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # 3. Áp dụng các bản vá (StrongR/Hluda Patches)
        echo "--- Đang áp dụng Patches ---"
        for path in "$PATCH_ROOT"/*; do
          if [ -d "$path" ]; then
            subproject=$(basename "$path")
            if [ -d "subprojects/$subproject" ]; then
              echo "Patching cho subprojects/$subproject..."
              cd "subprojects/$subproject"
              git am --abort 2>/dev/null || true
              git am "$path"/*.patch || echo "Cảnh báo: Patch lỗi tại $subproject (Có thể do lệch phiên bản)"
              cd ../..
            fi
          fi
        done
        
        # 4. Biên dịch chuyên biệt cho Android Server bằng Ninja
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "--- Bắt đầu biên dịch Ninja ---"
        ./configure --host=android-arm64
        
        # Chỉ build frida-server để đảm bảo 100% không bị Killed do thiếu RAM
        cd subprojects/frida-core
        ../../../ninja -C ../../build/frida-android-arm64 server
        
        # 5. Đóng gói kết quả
        mkdir -p ../../../dist
        cp ../../build/frida-android-arm64/server/frida-server ../../../dist/hluda-server-arm64
        gzip ../../../dist/hluda-server-arm64

    - name: Upload Frida Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-${{ needs.check_version.outputs.FRIDA_VERSION }}-arm64
        path: dist/hluda-server-arm64.gz
