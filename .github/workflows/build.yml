name: strongR-frida-auto

on:
  workflow_dispatch: # Nút bấm thủ công
  schedule:
    - cron: "0 0 * * *" # Tự động kiểm tra và build mỗi ngày một lần

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get Latest Frida Version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | jq -r .tag_name)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  android_build:
    runs-on: ubuntu-22.04
    needs: check_version
    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip -y
        python3 -m pip install lief

    - name: Build strongR-frida (ARM64)
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 1. Clone Patches
        echo "--- Cloning Patches ---"
        git clone ${{ secrets.PATCH_REPO }} MyPatches || exit 1
        PATCH_ROOT=$(realpath MyPatches/strongR-frida)
        
        # 2. Clone Frida bản mới nhất (Tag: ${{ needs.check_version.outputs.FRIDA_VERSION }})
        echo "--- Cloning Frida Source v${{ needs.check_version.outputs.FRIDA_VERSION }} ---"
        git clone --depth 1 --branch ${{ needs.check_version.outputs.FRIDA_VERSION }} --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # 3. Apply Patches
        echo "--- Applying Patches ---"
        for path in "$PATCH_ROOT"/*; do
          if [ -d "$path" ]; then
            subproject=$(basename "$path")
            if [ -d "subprojects/$subproject" ]; then
              echo "Patching $subproject..."
              cd "subprojects/$subproject"
              git am "$path"/*.patch || echo "Skip patch error for $subproject"
              cd ../..
            fi
          fi
        done
        
        # 4. Biên dịch chuyên biệt cho Server (Tránh tràn RAM)
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "--- Starting Build ---"
        ./configure --host=android-arm64
        
        # Chỉ build đúng thành phần frida-server để đảm bảo 100% thành công
        cd subprojects/frida-core
        ../../../ninja -C ../../build/frida-android-arm64 server
        
        # 5. Lưu kết quả
        mkdir -p ../../../dist
        cp ../../build/frida-android-arm64/server/frida-server ../../../dist/hluda-server-latest-arm64
        gzip ../../../dist/hluda-server-latest-arm64

    - name: Upload Frida Server
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-${{ needs.check_version.outputs.FRIDA_VERSION }}
        path: dist/*.gz
