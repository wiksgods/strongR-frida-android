name: strongR-frida

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Nhập phiên bản Frida muốn build (ví dụ 16.5.6)'
        required: true
        default: '16.5.6'

jobs: 
  android_build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip -y
        python3 -m pip install lief

    - name: Build strongR-frida (ARM64)
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 1. Clone Patch (Sử dụng GITHUB_TOKEN để tránh lỗi quyền truy cập nếu là repo cá nhân)
        echo "--- Cloning Patches ---"
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/Patchs.git MyPatches || \
        git clone ${{ secrets.PATCH_REPO }} MyPatches
        
        PATCH_ROOT=$(realpath MyPatches/strongR-frida)
        
        # 2. Clone Frida đúng phiên bản bạn cần
        echo "--- Cloning Frida Source v${{ github.event.inputs.frida_version }} ---"
        git clone --depth 1 --branch ${{ github.event.inputs.frida_version }} --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # 3. Apply Patches
        echo "--- Applying Patches ---"
        for path in "$PATCH_ROOT"/*; do
          if [ -d "$path" ]; then
            subproject=$(basename "$path")
            if [ -d "subprojects/$subproject" ]; then
              echo "Patching $subproject..."
              cd "subprojects/$subproject"
              git am --abort 2>/dev/null || true
              git am "$path"/*.patch || echo "Skip patch error for $subproject"
              cd ../..
            fi
          fi
        done
        
        # 4. Biên dịch (Chỉ build Server để tiết kiệm thời gian và tránh tràn RAM)
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "--- Starting Build ---"
        # Thay vì 'make' toàn bộ, chỉ build core server
        ./configure --host=android-arm64
        cd subprojects/frida-core
        ../../../ninja -C ../../build/frida-android-arm64 server
        
        # 5. Gom hàng
        mkdir -p ../../../dist
        cp ../../build/frida-android-arm64/server/frida-server ../../../dist/hluda-server-${{ github.event.inputs.frida_version }}-arm64
        gzip ../../../dist/hluda-server-${{ github.event.inputs.frida_version }}-arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-v${{ github.event.inputs.frida_version }}
        path: dist/hluda-server-*.gz
