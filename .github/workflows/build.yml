name: strongR-frida-auto-full-fix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get Latest Frida Version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | jq -r .tag_name)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  android_build:
    runs-on: ubuntu-22.04
    needs: check_version
    steps:
    - name: Checkout Current Repo
      uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.2.0
      with:
        ndk-version: r25b

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip jq -y
        python3 -m pip install lief

    - name: Build strongR-frida (ARM64)
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 1. Tải bộ Patch từ nguồn hzzheyang
        git clone https://github.com/hzzheyang/strongR-frida-android.git ExternalPatch
        PATCH_ROOT=$(realpath ExternalPatch/strongR-frida)
        
        # 2. Clone Frida Source bản mới nhất
        git clone --depth 1 --branch ${{ needs.check_version.outputs.FRIDA_VERSION }} --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # 3. Áp dụng các bản vá tàng hình
        echo "--- Đang áp dụng Patches ---"
        for path in "$PATCH_ROOT"/*; do
          if [ -d "$path" ]; then
            subproject=$(basename "$path")
            if [ -d "subprojects/$subproject" ]; then
              echo "Patching cho subprojects/$subproject..."
              cd "subprojects/$subproject"
              git am --abort 2>/dev/null || true
              git am "$path"/*.patch || echo "Bỏ qua lỗi patch cho $subproject"
              cd ../..
            fi
          fi
        done
        
        # 4. Cấu hình và Biên dịch
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "--- Đang cấu hình môi trường build ---"
        ./configure --host=android-arm64
        
        # Tự động tìm đường dẫn Ninja mà Frida vừa tải về
        NINJA_BIN=$(find $(pwd)/deps -name ninja -type f | head -n 1)
        if [ -z "$NINJA_BIN" ]; then
          echo "Không tìm thấy ninja trong deps, thử dùng ninja hệ thống..."
          NINJA_BIN=$(which ninja)
        fi
        echo "Sử dụng Ninja tại: $NINJA_BIN"
        
        # Chỉ build frida-server để tránh quá tải RAM
        cd subprojects/frida-core
        $NINJA_BIN -C ../../build/frida-android-arm64 server
        
        # 5. Đóng gói kết quả
        mkdir -p ../../../dist
        cp ../../build/frida-android-arm64/server/frida-server ../../../dist/hluda-server-arm64
        gzip ../../../dist/hluda-server-arm64

    - name: Upload Frida Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-${{ needs.check_version.outputs.FRIDA_VERSION }}-arm64
        path: dist/hluda-server-arm64.gz
