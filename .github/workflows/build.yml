name: strongR-frida

on:
  workflow_dispatch: # Sử dụng nút "Run workflow" thủ công để ép build

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}
    steps:
      - name: Pull Frida Latest Release
        id: pullFridaLatestRelease
        uses: actions/github-script@v6
        with:
          script: |
            const releaseResponse = await github.rest.repos.getLatestRelease({
              owner: 'frida',
              repo: 'frida',
            })
            core.setOutput('FRIDA_VERSION', releaseResponse.data.tag_name);

  android_build:
    runs-on: ubuntu-22.04
    needs: [check_version]
    # Đã bỏ dòng 'if' để chắc chắn job này luôn chạy

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b
    
    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip -y

    - name: build frida for Android (Focus ARM64)
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # Clone Patch repo
        git clone ${{ secrets.PATCH_REPO }} Patchs
        
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        git clone --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # Apply Patches
        for path in ../Patchs/strongR-frida/*; do
          if [ -d "$path" ]; then
            name=$(basename $path)
            cd subprojects/$name
            git am ../../../Patchs/strongR-frida/$name/*.patch || echo "Skip patch error"
            cd ../..
          fi
        done
        
        # Chỉ build ARM64 để tránh hết RAM/Disk trên GitHub Action
        ./configure --host=android-arm64
        make
        
        mkdir -p ../output/
        cp subprojects/frida-core/server/frida-server ../output/hluda-server-arm64
        gzip ../output/hluda-server-arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strongR-frida-arm64
        path: output/hluda-server-arm64.gz
