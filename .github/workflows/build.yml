name: strongR-frida

on:
  schedule:
    - cron: "0 9/12 * * *"
  workflow_dispatch:

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}
      ALREADY_RELEASE: ${{ steps.checkReleaseVersion.outputs.ALREADY_RELEASE }}
    steps:
      - name: Pull Frida Latest Release
        id: pullFridaLatestRelease
        uses: actions/github-script@v6 # Nâng cấp lên v6 để ổn định hơn
        with:
          script: |
            const releaseResponse = await github.rest.repos.getLatestRelease({
              owner: 'frida',
              repo: 'frida',
            })
            core.setOutput('FRIDA_VERSION', releaseResponse.data.tag_name);

      - name: Check release version
        id: checkReleaseVersion
        uses: actions/github-script@v6
        with:
          script: |
            try {
              const releaseVersion = '${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}'
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: releaseVersion
              });
              core.setOutput('ALREADY_RELEASE', '1');
            } catch (e) {
              core.setOutput('ALREADY_RELEASE', '0');
            }

  create_release:
    needs: check_version
    runs-on: ubuntu-22.04
    if: needs.check_version.outputs.ALREADY_RELEASE == '0'
    outputs:
      upload_url: ${{ steps.createRelease.outputs.upload_url }}
    steps:
      - uses: actions/create-release@v1
        id: createRelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          release_name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          prerelease: false

  android_build:
    runs-on: ubuntu-22.04
    needs: [check_version, create_release]
    # Chỉ chạy nếu check_version báo chưa có bản release
    if: needs.check_version.outputs.ALREADY_RELEASE == '0'

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    # Fix lỗi Credentials bằng cách dùng GITHUB_TOKEN mặc định
    - uses: fusion-engineering/setup-git-credentials@v2
      with:
        credentials: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential ninja-build gcc-multilib g++-multilib flex bison ruby python3-requests python3-setuptools python3-pip -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief

    - name: build frida for Android
      shell: bash
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # Pull Patch repo (Bạn cần đảm bảo PATCH_REPO là public hoặc dùng token)
        git clone ${{ secrets.PATCH_REPO }} Patchs
        
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        git clone --recurse-submodules https://github.com/frida/frida
        cd frida
        
        # Apply StrongR patches
        for path in ../Patchs/strongR-frida/*
        do
          if [ -d "$path" ]; then
            name=$(basename $path)
            echo "Applying patches to subprojects/$name"
            cd subprojects/$name
            git am ../../../Patchs/strongR-frida/$name/*.patch || echo "Failed to apply patch"
            cd ../..
          fi
        done
        
        # Build từng kiến trúc
        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        for ARCH in $ARCHES
        do
          echo "Building for $ARCH..."
          ./configure --host=$ARCH
          make
          # Di chuyển file ra ngoài để tránh bị dọn dẹp khi make kiến trúc khác
          mkdir -p ../output/$ARCH
          cp subprojects/frida-core/server/frida-server ../output/$ARCH/
          cp subprojects/frida-core/inject/frida-inject ../output/$ARCH/
          cp subprojects/frida-core/lib/gadget/frida-gadget.so ../output/$ARCH/
          make clean
        done

    - name: Compress and Upload Assets
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ needs.create_release.outputs.upload_url }}
        VERSION: ${{ needs.check_version.outputs.FRIDA_VERSION }}
      run: |
        cd output
        for ARCH in android-arm android-arm64 android-x86 android-x86_64
        do
          gzip $ARCH/frida-server
          # Sử dụng gh cli (có sẵn trong github runner) để upload nhanh và chính xác hơn
          gh release upload $VERSION "$ARCH/frida-server.gz#hluda-server-$VERSION-$ARCH.gz"
        done
